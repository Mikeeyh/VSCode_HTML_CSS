<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="//use.fontawesome.com/releases/v6.6.0/css/all.css">
</head>
<body>
    
    <form action="#" class="loginForm">
    <fieldset>
        <legend>Login</legend>

        <p class="field">
            <input type="email"
            name="email"
            id="email"
            required>
            <label for="email" class="required-label">Email</label>
        </p>

        <p class="field">
            <input type="password"
            name="password"
            id="password"
            required>
            <label for="password" class="required-label">Password</label>
        </p>

        <input type="submit" value="login">
    </fieldset>
    </form>

    <form action="#" class="loginForm">
        <fieldset>
            <legend class="second-legend">Login</legend>
    
            <p class="field">
                <i class="fa-solid fa-envelope"></i>
                <input type="email"
                name="email"
                id="email"
                required>
                <span class="help-text">example: konstantin.dankov@gmail.com</span>
                <label for="email" class="required-label">Email</label>
            </p>
    
            <p class="field">
                <i class="fa-solid fa-key"></i>
                <input type="password"
                name="password"
                id="password"
                required>
                <span class="help-text">minimum 6 characters, letters and numbers, at least 1 special character</span>
                <label for="password" class="required-label">Password</label>
            </p>
    
            <input type="submit" value="login">
        </fieldset>
        </form>

</body>
</html>
